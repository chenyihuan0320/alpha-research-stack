name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dev dependencies
        run: python -m pip install -e ".[dev]"

      - name: Run project checks
        shell: bash
        run: |
          if [[ -f Makefile ]]; then
            make check
          else
            echo "Makefile not found; skipping project checks."
          fi
